<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NYXORA | Luxury Accessories</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
}

/* NAV */
nav{
    width:100%;
    padding:20px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(0,0,0,0.7);
}

.logo{
    font-size:30px;
    font-weight:700;
    color:#ffd700;
}

nav ul{
    display:flex;
    gap:25px;
    list-style:none;
}

nav ul li a{
    color:white;
    text-decoration:none;
}

/* PRODUCTS */
.products{
    padding:100px 8%;
    text-align:center;
}

.section-title{
    font-size:40px;
    margin-bottom:40px;
}

.card{
    width:280px;
    margin:auto;
    background:#1a1a1a;
    border-radius:20px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:300px;
    object-fit:cover;
}

.card-content{
    padding:20px;
}

.price{
    color:#ffd700;
    font-size:20px;
    font-weight:bold;
    margin-top:10px;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
<div class="logo">NYXORA</div>
<ul>
<li><a href="#">Home</a></li>
<li><a href="#">Shop</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>

<!-- PRODUCTS -->
<section class="products">

<h2 class="section-title">Trending Product</h2>

<!-- ONLY 1 PRODUCT -->
<div class="card">

    <!-- 🔴 YOUR IMAGE -->
    <img src="https://i.ibb.co/d09kb3qm.jpg" alt="Product">

    <div class="card-content">
        <h3>Butterfly Earrings</h3>
        <p>Premium fashion accessory</p>
        <div class="price">₹299 Only</div>
    </div>

</div>

</section>

</body>
</html>
